name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build MCP server
        run: npm run build

      - name: Typecheck examples
        run: npm run check:types

      - name: Render gate (every example mounts)
        run: npm run check:render

      - name: Content integrity (no dangling links)
        run: npm run check:integrity

      - name: Generate index artifacts
        run: npm run build:index

      - name: MCP smoke (tools + flagship recipe flow)
        run: npm run smoke

      - name: Build demo gallery
        run: npm run build:demo
