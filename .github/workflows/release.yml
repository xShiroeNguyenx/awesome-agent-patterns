name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the GitHub Release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - name: Install
        run: npm ci

      - name: Build + verify
        run: |
          npm run build
          npm run check:types
          npm run check:render
          npm run check:integrity
          npm run smoke

      # Publishes awesome-agent-patterns-mcp. `prepack` rebuilds and bundles
      # patterns/recipes into the package so it is self-contained.
      - name: Publish to npm
        run: npm publish -w mcp-server --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        run: gh release create "${{ github.ref_name }}" --generate-notes --title "${{ github.ref_name }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
