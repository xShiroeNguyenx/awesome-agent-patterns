<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="awesome-agent-patterns">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e293b"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
  </defs>
  <!-- dark slate tile -->
  <rect x="0" y="0" width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- composed UI layout: header + sidebar + two content blocks (one accent) -->
  <g>
    <rect x="12" y="12" width="40" height="8"  rx="3" fill="#f8fafc"/>
    <rect x="12" y="24" width="12" height="28" rx="3" fill="#94a3b8"/>
    <rect x="28" y="24" width="24" height="12" rx="3" fill="#d946ef"/>
    <rect x="28" y="40" width="24" height="12" rx="3" fill="#f8fafc"/>
  </g>
</svg>
